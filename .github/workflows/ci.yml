name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Lint & test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      # Syntax check of the canonical worker module.
      - name: Syntax check
        run: node --check "multiclouds3 v7.0.js"

      # Zero-dependency test suite (mocks fetch/caches; no secrets/network needed).
      - name: Run tests
        run: node --test

  openapi:
    name: Validate OpenAPI spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docs/openapi.yaml
        run: npx --yes @redocly/cli@latest lint docs/openapi.yaml
